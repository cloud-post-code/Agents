<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @page { margin: 1in; }
  body { font-family: Arial, sans-serif; font-size: 12pt; color: #222; }
  h1 { font-size: 20pt; margin-bottom: 4pt; }
  h2 { font-size: 14pt; margin-top: 16pt; }
  table { width: 100%; border-collapse: collapse; margin-top: 8pt; }
  th { background: #f5f5f5; text-align: left; padding: 6pt 8pt; border-bottom: 1pt solid #ccc; }
  td { padding: 5pt 8pt; border-bottom: 1pt solid #eee; }
  .kpi { display: inline-block; margin-right: 24pt; }
  .kpi-value { font-size: 18pt; font-weight: bold; }
  .kpi-label { font-size: 9pt; color: #666; }
  footer { margin-top: 24pt; font-size: 9pt; color: #999; border-top: 1pt solid #eee; padding-top: 4pt; }
</style>
</head>
<body>
  <h1>{% block title %}Report{% endblock %}</h1>
  <p style="color:#666; font-size:10pt;">Generated on {% block date %}{% endblock %}</p>
  {% block content %}{% endblock %}
  <footer>Artisan Platform — Confidential</footer>
</body>
</html>
