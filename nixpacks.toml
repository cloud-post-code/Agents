[phases.setup]
nixPkgs = ["python312"]
cmds = ["curl -sSL https://bootstrap.pypa.io/get-pip.py | python3"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[phases.build]
cmds = ["cd backend && alembic upgrade head"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
