[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc"]

[phases.install]
cmds = ["python3 -m pip install -r backend/requirements.txt"]

[phases.build]
cmds = ["cd backend && python3 -m alembic upgrade head"]

[start]
cmd = "cd backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
